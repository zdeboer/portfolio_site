name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  web:
    name: Web (format/lint/build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Prettier (check)
        run: npm run format:check

      - name: ESLint
        run: npm run lint

      - name: Build
        run: npm run build

  php_syntax:
    name: PHP (syntax check)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: PHP lint
        run: |
          find src/projects/8-Track -name "*.php" -print0 | xargs -0 -n1 php -l
